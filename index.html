<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>⚡ Подслушано Энергии</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #f8f9fa;
      --text: #1a1a1a;
      --text-secondary: #555555;
      --primary: #1976d2;
      --accent: #1565c0;
      --border: #dde4ea;
      --input-bg: #f1f3f5;
      --shadow: 0 4px 12px rgba(0,0,0,0.06);
      --glow: rgba(25,118,210,0.25);
      --radius: 16px;
      --nav-width: 220px;
    }
    .dark-theme {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #ffffff;
      --text-secondary: #aaaaaa;
      --primary: #bb86fc;
      --accent: #9c4dff;
      --border: #333333;
      --input-bg: #2a2a2a;
      --shadow: 0 4px 15px rgba(0,0,0,0.4);
      --glow: rgba(187,134,252,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.4s, color 0.4s;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #app {
      display: flex;
      width: 100%;
      max-width: 900px;
      min-height: 100vh;
      position: relative;
    }

    .vpn-block {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      font-size: 22px;
      color: var(--text);
    }
    .vpn-block .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .sidebar {
      width: var(--nav-width);
      background: var(--card);
      border-right: 2px solid var(--border);
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: sticky;
      top: 0;
      height: 100vh;
      z-index: 50;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      color: var(--text);
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 0 12px var(--glow);
    }
    .nav-item svg {
      width: 22px; height: 22px;
      fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 12px 0 8px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      backdrop-filter: blur(12px);
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      text-shadow: 0 0 12px var(--glow);
      cursor: default;
    }
    .settings-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--card);
      color: var(--primary);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.25s;
    }
    .settings-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 0 16px var(--glow);
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 80px;
      transition: opacity 0.15s ease;
    }
    .feed.fade-out { opacity: 0; }
    .post-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(20px);
      position: relative;
    }
    .post-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .post-card:hover {
      border-color: var(--primary);
      box-shadow: 0 8px 25px var(--glow);
      transform: translateY(-3px);
    }
    .post-text {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .post-time {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .post-image {
      max-width: 100%;
      max-height: 400px;
      border-radius: 12px;
      margin-top: 10px;
      object-fit: contain;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .post-image:hover { transform: scale(1.02); }
    .pin-icon {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 18px;
      opacity: 0.8;
    }

    .fab {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 26px;
      border: none;
      box-shadow: 0 6px 20px var(--glow);
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .fab:hover {
      background: var(--accent);
      box-shadow: 0 10px 30px var(--glow);
      transform: translateY(-3px) scale(1.05);
    }

    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s;
      justify-content: center;
      align-items: center;
    }
    .modal.active { visibility: visible; opacity: 1; }
    .modal-content {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      transform: scale(0.9);
      transition: transform 0.3s;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal.active .modal-content { transform: scale(1); }
    .modal-title { font-size: 20px; margin-bottom: 16px; font-weight: 600; }
    .modal-input {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: var(--input-bg);
      color: var(--text);
      margin-bottom: 12px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .modal-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 10px var(--glow);
    }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .btn {
      padding: 10px 18px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-size: 14px;
      transition: all 0.25s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .btn:hover {
      filter: brightness(1.1);
      box-shadow: 0 6px 14px var(--glow);
      transform: translateY(-1px);
    }
    .btn-secondary { background: #9e9e9e; }
    .btn-danger { background: #e53935; }
    .btn-success { background: #2e7d32; }

    .comment-item {
      background: var(--input-bg);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .image-preview {
      position: relative;
      display: inline-block;
      margin-bottom: 12px;
    }
    .image-preview img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .remove-image-btn {
      position: absolute;
      top: -8px; right: -8px;
      background: #e53935;
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px; height: 24px;
      font-size: 14px;
      cursor: pointer;
    }
    .file-input-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .file-input-label input { display: none; }

    .rules p { margin-bottom: 12px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: var(--card);
        border-top: 2px solid var(--border);
        padding: 8px 10px;
        justify-content: space-around;
        z-index: 100;
      }
      .bottom-nav .nav-item {
        flex-direction: column;
        gap: 4px;
        font-size: 11px;
        padding: 8px 10px;
      }
      .bottom-nav .nav-item svg { width: 22px; height: 22px; }
    }
    @media (min-width: 769px) {
      .bottom-nav { display: none; }
    }
  </style>
</head>
<body>
  <div class="vpn-block" id="vpnBlock">

  <div id="app">
    <nav class="sidebar" id="sidebar">

  <button class="fab" id="createPostBtn">✚</button>

  <!-- Модалки -->

  <script type="module">
    const SUPABASE_URL = 'https://jsfgmzsypmbnvvthbvbh.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_JCzEET-XQtIa90ovm3GKOw_feSE9nYV';
    const ADMIN_PASSWORD = 'R3dF0x-Jump$OverTh3M00n1784skdjf';

    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const BUCKET_NAME = 'post-images';

    let userIp = null;
    async function checkGeo() {
      try {
        const resp = await fetch('https://ip-api.com/json/?fields=countryCode,query');
        const data = await resp.json();
        if (data && data.query) {
          userIp = data.query;
          if (data.countryCode && data.countryCode !== 'RU') {
            document.getElementById('vpnBlock').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            document.getElementById('createPostBtn').style.display = 'none';
            return false;
          }
        }
      } catch (e) {}
      document.getElementById('vpnBlock').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('createPostBtn').style.display = 'flex';
      return true;
    }

    async function isIpBanned(ip) {
      if (!ip) return false;
      const { data } = await supabase.from('banned_ips').select('ip').eq('ip', ip).single();
      return !!data;
    }

    async function banIp(ip) {
      if (!ip) return;
      await supabase.from('banned_ips').upsert({ ip });
    }

    function getFingerprint() {
      let fp = localStorage.getItem('device_fp');
      if (!fp) {
        fp = 'fp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('device_fp', fp);
      }
      return fp;
    }

    async function getIp() {
      if (userIp) return userIp;
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        userIp = data.ip;
        return userIp;
      } catch { return 'неизвестно'; }
    }

    async function collectSubmitterInfo() {
      const ip = await getIp();
      return { ip, ua: navigator.userAgent, fingerprint: getFingerprint() };
    }

    async function uploadImage(file) {
      if (file.size > 5 * 1024 * 1024) throw new Error('Файл слишком большой (макс. 5 МБ)');
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}_${Math.random().toString(36).substr(2,9)}.${fileExt}`;
      const { data, error } = await supabase.storage
        .from(BUCKET_NAME)
        .upload(fileName, file, { cacheControl: '3600', upsert: false });
      if (error) throw new Error(`Ошибка загрузки: ${error.message || 'неизвестная ошибка'}`);
      const { data: urlData } = supabase.storage.from(BUCKET_NAME).getPublicUrl(fileName);
      return urlData.publicUrl;
    }

    const $ = (s) => document.querySelector(s);
    const feed = $('#feed');
    const createPostBtn = $('#createPostBtn');
    const settingsBtn = $('#settingsBtn');
    const adminModal = $('#adminModal');
    const adminPassInput = $('#adminPassInput');
    const submitAdminBtn = $('#submitAdminBtn');
    const cancelAdminBtn = $('#cancelAdminBtn');
    const createPostModal = $('#createPostModal');
    const newPostText = $('#newPostText');
    const submitPostBtn = $('#submitPostBtn');
    const cancelPostBtn = $('#cancelPostBtn');
    const postDetailModal = $('#postDetailModal');
    const detailPostContent = $('#detailPostContent');
    const commentsList = $('#commentsList');
    const newCommentText = $('#newCommentText');
    const submitCommentBtn = $('#submitCommentBtn');
    const closeDetailBtn = $('#closeDetailBtn');
    const adminPanelModal = $('#adminPanelModal');
    const adminItemsList = $('#adminItemsList');
    const closeAdminPanelBtn = $('#closeAdminPanelBtn');
    const settingsModal = $('#settingsModal');
    const darkThemeToggle = $('#darkThemeToggle');
    const closeSettingsBtn = $('#closeSettingsBtn');
    const commentFormBlock = $('#commentFormBlock');
    const commentsLockedMsg = $('#commentsLockedMsg');

    const postImageInput = $('#postImageInput');
    const postImagePreview = $('#postImagePreview');
    const postPreviewImg = $('#postPreviewImg');
    const removePostImageBtn = $('#removePostImageBtn');
    const commentImageInput = $('#commentImageInput');
    const commentImagePreview = $('#commentImagePreview');
    const commentPreviewImg = $('#commentPreviewImg');
    const removeCommentImageBtn = $('#removeCommentImageBtn');

    let currentPostImageFile = null;
    let currentCommentImageFile = null;

    function setupImagePreview(input, previewDiv, imgElement, removeBtn, fileRef) {
      input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          fileRef.current = file;
          const reader = new FileReader();
          reader.onload = (ev) => {
            imgElement.src = ev.target.result;
            previewDiv.style.display = 'block';
          };
          reader.readAsDataURL(file);
        } else {
          fileRef.current = null;
          previewDiv.style.display = 'none';
        }
      });
      removeBtn.addEventListener('click', () => {
        fileRef.current = null;
        input.value = '';
        previewDiv.style.display = 'none';
      });
    }

    const postImageFile = { current: null };
    const commentImageFile = { current: null };
    setupImagePreview(postImageInput, postImagePreview, postPreviewImg, removePostImageBtn, postImageFile);
    setupImagePreview(commentImageInput, commentImagePreview, commentPreviewImg, removeCommentImageBtn, commentImageFile);

    let currentTab = 'home';
    let currentPosts = [];
    let currentPostId = null;
    let currentComments = [];

    function setActiveTab(tab) {
      if (currentTab === tab) return;
      currentTab = tab;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.querySelectorAll(`.nav-item[data-tab="${tab}"]`).forEach(el => el.classList.add('active'));

      feed.classList.add('fade-out');
      setTimeout(() => {
        if (tab === 'home') loadHome();
        else if (tab === 'rules') showRules();
        else if (tab === 'moderation') showAdminAuth();
      }, 150);
    }

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => setActiveTab(item.dataset.tab));
    });

    async function loadHome() {
      const { data, error } = await supabase
        .from('messages')
        .select('*')
        .is('parent_id', null)
        .eq('approved', true)
        .order('pinned', { ascending: false })
        .order('created_at', { ascending: false });
      if (error) {
        feed.innerHTML = '<div class="empty-message">Ошибка загрузки</div>';
        feed.classList.remove('fade-out');
        return;
      }
      currentPosts = data || [];
      renderHomeFeed();
      feed.classList.remove('fade-out');
    }

    function renderHomeFeed() {
      if (currentPosts.length === 0) {
        feed.innerHTML = '<div class="empty-message">Пока никто ничего не рассказал...</div>';
        feed.classList.remove('fade-out');
        return;
      }
      feed.innerHTML = currentPosts.map(post => {
        const imgHtml = post.image_url
          ? `<img src="${escapeHtml(post.image_url)}" class="post-image" loading="lazy" onclick="event.stopPropagation(); window.open('${escapeHtml(post.image_url)}')">`
          : '';
        const pinHtml = post.pinned ? '<span class="pin-icon">📌</span>' : '';
        return `
          <div class="post-card" data-id="${post.id}">
            ${pinHtml}
            <div class="post-text">${escapeHtml(post.text)}</div>
            ${imgHtml}
            <div class="post-time">${new Date(post.created_at).toLocaleString('ru-RU')}</div>
          </div>
        `;
      }).join('');
      animateCards('.post-card');
      document.querySelectorAll('.post-card').forEach(card => {
        card.addEventListener('click', () => openPost(card.dataset.id));
      });
      feed.classList.remove('fade-out');
    }

    function showRules() {
      feed.innerHTML = `
        <div class="rules">
          <h2>Правила сообщества</h2>
          <p>1. Запрещены угрозы, оскорбления и призывы к насилию.</p>
          <p>2. Запрещён спам и реклама.</p>
          <p>3. Уважайте чужое мнение.</p>
          <p>4. За нарушение — бан.</p>
        </div>
      `;
      feed.classList.remove('fade-out');
    }

    function animateCards(selector) {
      document.querySelectorAll(selector).forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 50);
      });
    }

    async function openPost(postId) {
      currentPostId = postId;
      let post = currentPosts.find(p => p.id === postId);
      if (!post) {
        const { data } = await supabase.from('messages').select('*').eq('id', postId).single();
        post = data;
      }
      if (!post) return;
      const imgHtml = post.image_url
        ? `<img src="${escapeHtml(post.image_url)}" class="post-image" style="max-height:300px; cursor:pointer;" onclick="window.open('${escapeHtml(post.image_url)}')">`
        : '';
      detailPostContent.innerHTML = `
        <div style="font-size: 18px; margin-bottom: 8px; font-weight: 500;">${escapeHtml(post.text)}</div>
        ${imgHtml}
        <div style="font-size: 12px; color: var(--text-secondary);">${new Date(post.created_at).toLocaleString('ru-RU')}</div>
      `;
      // Проверяем locked
      if (post.locked) {
        commentFormBlock.style.display = 'none';
        commentsLockedMsg.style.display = 'block';
      } else {
        commentFormBlock.style.display = 'block';
        commentsLockedMsg.style.display = 'none';
      }
      await loadComments(postId);
      showModal(postDetailModal);
    }

    async function loadComments(postId) {
      const { data } = await supabase
        .from('messages')
        .select('*')
        .eq('parent_id', postId)
        .eq('approved', true)
        .order('created_at', { ascending: true });
      currentComments = data || [];
      renderComments();
    }

    function renderComments() {
      if (!currentComments.length) {
        commentsList.innerHTML = '<div style="color: var(--text-secondary); margin-bottom: 12px;">Нет комментариев</div>';
        return;
      }
      commentsList.innerHTML = currentComments.map(c => {
        const imgHtml = c.image_url
          ? `<img src="${escapeHtml(c.image_url)}" class="post-image" style="max-height:200px; margin-top:6px;" onclick="window.open('${escapeHtml(c.image_url)}')">`
          : '';
        return `
          <div class="comment-item">
            <div>${escapeHtml(c.text)}</div>
            ${imgHtml}
            <div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">${new Date(c.created_at).toLocaleString('ru-RU')}</div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showModal(m) { m.classList.add('active'); }
    function hideModal(m) { m.classList.remove('active'); }

    function showAdminAuth() {
      adminPassInput.value = '';
      showModal(adminModal);
      adminPassInput.focus();
    }

    async function refreshCurrentFeed() {
      if (currentTab === 'home') await loadHome();
    }

    async function showAdminPanel() {
      // Непроверенные записи (все: посты и комментарии)
      const { data: unapproved } = await supabase
        .from('messages')
        .select('*')
        .eq('approved', false)
        .order('created_at', { ascending: false });

      // Одобренные посты для управления
      const { data: approvedPosts } = await supabase
        .from('messages')
        .select('*')
        .eq('approved', true)
        .is('parent_id', null)
        .order('created_at', { ascending: false });

      adminItemsList.innerHTML = '';

      // Секция непроверенных
      if (unapproved && unapproved.length > 0) {
        const sectionTitle = document.createElement('div');
        sectionTitle.style.fontWeight = '600';
        sectionTitle.style.marginBottom = '8px';
        sectionTitle.textContent = '📥 На модерации';
        adminItemsList.appendChild(sectionTitle);

        for (const item of unapproved) {
          const div = document.createElement('div');
          div.className = 'admin-item';
          div.dataset.id = item.id;
          const imgHtml = item.image_url
            ? `<div><img src="${escapeHtml(item.image_url)}" style="max-width:200px; max-height:150px; border-radius:8px; margin-top:6px;"/></div>`
            : '';

          let parentInfo = '';
          if (item.parent_id) {
            // Загружаем родительский пост для отображения
            const { data: parentPost } = await supabase
              .from('messages')
              .select('text, created_at')
              .eq('id', item.parent_id)
              .single();
            if (parentPost) {
              parentInfo = `
                <div style="font-size:12px; color:var(--primary); margin-top:4px; background:var(--input-bg); padding:6px; border-radius:8px;">
                  <strong>К посту:</strong> ${escapeHtml(parentPost.text).substring(0, 80)}
                  <span style="display:block; font-size:10px; color:var(--text-secondary);">${new Date(parentPost.created_at).toLocaleString('ru-RU')}</span>
                </div>
              `;
            } else {
              parentInfo = '<div style="font-size:12px; color:var(--text-secondary);">(пост удалён)</div>';
            }
          }

          div.innerHTML = `
            <div style="font-weight:600;">${item.parent_id ? '💬 Комментарий' : '📝 Пост'}</div>
            <div>${escapeHtml(item.text)}</div>
            ${imgHtml}
            ${parentInfo}
            <div style="font-size:12px; color:var(--text-secondary);">${new Date(item.created_at).toLocaleString('ru-RU')}</div>
            <div class="submitter-info" style="margin-top:6px; font-size:12px; background:var(--input-bg); padding:8px; border-radius:8px;">
              <div><strong>IP:</strong> ${item.submitter_ip || '—'}
                <button class="btn btn-secondary copy-btn" data-text="${item.submitter_ip || ''}" style="font-size:11px; padding:2px 8px; margin-left:6px;">Скопировать</button>
                <button class="btn btn-danger ban-ip-btn" style="font-size:11px; padding:2px 8px; margin-left:4px;">🚫 Забанить IP</button>
              </div>
              <div><strong>User-Agent:</strong> ${item.submitter_ua || '—'}</div>
              <div><strong>Fingerprint:</strong> ${item.submitter_fingerprint || '—'}
                <button class="btn btn-secondary copy-btn" data-text="${item.submitter_fingerprint || ''}" style="font-size:11px; padding:2px 8px; margin-left:6px;">Скопировать</button>
              </div>
            </div>
            <div style="display:flex; gap:8px; margin-top:10px;">
              <button class="btn btn-success approve-btn">Одобрить</button>
              <button class="btn btn-danger delete-btn">Удалить</button>
            </div>
          `;
          adminItemsList.appendChild(div);

          div.querySelector('.approve-btn').addEventListener('click', async () => {
            await supabase.from('messages').update({ approved: true }).eq('id', item.id);
            await showAdminPanel();
            await refreshCurrentFeed();
          });
          div.querySelector('.delete-btn').addEventListener('click', async () => {
            if (item.image_url) {
              const url = new URL(item.image_url);
              const pathParts = url.pathname.split('/');
              const fileName = pathParts[pathParts.length - 1];
              await supabase.storage.from(BUCKET_NAME).remove([fileName]);
            }
            await supabase.from('messages').delete().eq('id', item.id);
            await showAdminPanel();
            await refreshCurrentFeed();
          });
          const banBtn = div.querySelector('.ban-ip-btn');
          if (banBtn) {
            banBtn.addEventListener('click', async () => {
              const ip = item.submitter_ip;
              if (ip && ip !== 'неизвестно') {
                await banIp(ip);
                alert(`IP ${ip} забанен.`);
              } else alert('Нет IP');
            });
          }
        }
      } else {
        const empty = document.createElement('div');
        empty.textContent = 'Нет непроверенных записей';
        empty.style.color = 'var(--text-secondary)';
        adminItemsList.appendChild(empty);
      }

      // Секция управления постами (закрепление и блокировка комментариев)
      if (approvedPosts && approvedPosts.length > 0) {
        const divider = document.createElement('hr');
        divider.style.margin = '20px 0';
        divider.style.border = '1px solid var(--border)';
        adminItemsList.appendChild(divider);

        const manageTitle = document.createElement('div');
        manageTitle.style.fontWeight = '600';
        manageTitle.style.marginBottom = '8px';
        manageTitle.textContent = '📌 Управление постами';
        adminItemsList.appendChild(manageTitle);

        for (const post of approvedPosts) {
          const div = document.createElement('div');
          div.className = 'manage-item';
          div.style.border = '1px solid var(--border)';
          div.style.borderRadius = '12px';
          div.style.padding = '12px';
          div.style.marginBottom = '8px';
          div.style.background = 'var(--card)';
          div.innerHTML = `
            <div style="font-weight:600;">${post.pinned ? '📌 Закреплено' : '📝 Пост'} ${post.locked ? '🔒' : ''}</div>
            <div>${escapeHtml(post.text).substring(0, 100)}</div>
            <div style="display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;">
              <button class="btn ${post.pinned ? 'btn-secondary' : 'btn-success'} toggle-pin-btn" data-id="${post.id}" data-pinned="${post.pinned}">
                ${post.pinned ? 'Открепить' : 'Закрепить'}
              </button>
              <button class="btn ${post.locked ? 'btn-success' : 'btn-secondary'} toggle-lock-btn" data-id="${post.id}" data-locked="${post.locked}">
                ${post.locked ? 'Разрешить комменты' : 'Запретить комменты'}
              </button>
            </div>
          `;
          adminItemsList.appendChild(div);

          const togglePinBtn = div.querySelector('.toggle-pin-btn');
          togglePinBtn.addEventListener('click', async () => {
            const newPinned = !(togglePinBtn.dataset.pinned === 'true');
            await supabase.from('messages').update({ pinned: newPinned }).eq('id', post.id);
            await showAdminPanel();
            await refreshCurrentFeed();
          });

          const toggleLockBtn = div.querySelector('.toggle-lock-btn');
          toggleLockBtn.addEventListener('click', async () => {
            const newLocked = !(toggleLockBtn.dataset.locked === 'true');
            await supabase.from('messages').update({ locked: newLocked }).eq('id', post.id);
            await showAdminPanel();
            // Обновлять ленту не обязательно, но можно
          });
        }
      }

      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const text = btn.dataset.text;
          if (text) navigator.clipboard.writeText(text).then(() => {
            btn.textContent = 'Скопировано!';
            setTimeout(() => btn.textContent = 'Скопировать', 1500);
          });
        });
      });

      showModal(adminPanelModal);
    }

    createPostBtn.addEventListener('click', async () => {
      const ip = await getIp();
      if (await isIpBanned(ip)) {
        alert('Вы забанены.');
        return;
      }
      newPostText.value = '';
      postImageFile.current = null;
      postImageInput.value = '';
      postImagePreview.style.display = 'none';
      showModal(createPostModal);
      newPostText.focus();
    });

    settingsBtn.addEventListener('click', () => showModal(settingsModal));

    submitAdminBtn.addEventListener('click', () => {
      if (adminPassInput.value === ADMIN_PASSWORD) {
        hideModal(adminModal);
        showAdminPanel();
      } else alert('Неверный пароль');
    });
    cancelAdminBtn.addEventListener('click', () => hideModal(adminModal));

    submitPostBtn.addEventListener('click', async () => {
      const text = newPostText.value.trim();
      if (!text && !postImageFile.current) {
        alert('Напишите текст или добавьте фото');
        return;
      }
      const ip = await getIp();
      if (await isIpBanned(ip)) {
        alert('Вы забанены');
        return;
      }
      let imageUrl = null;
      if (postImageFile.current) {
        try {
          imageUrl = await uploadImage(postImageFile.current);
        } catch (e) {
          alert(e.message);
          return;
        }
      }
      const info = await collectSubmitterInfo();
      const { error: insertError } = await supabase.from('messages').insert([{
        text: text || '',
        approved: false,
        submitter_ip: info.ip,
        submitter_ua: info.ua,
        submitter_fingerprint: info.fingerprint,
        image_url: imageUrl
      }]);
      if (insertError) {
        alert('Ошибка при сохранении поста: ' + insertError.message);
        return;
      }
      hideModal(createPostModal);
      if (currentTab === 'home') loadHome();
    });
    cancelPostBtn.addEventListener('click', () => hideModal(createPostModal));

    submitCommentBtn.addEventListener('click', async () => {
      const text = newCommentText.value.trim();
      if (!text && !commentImageFile.current) {
        alert('Напишите текст или добавьте фото');
        return;
      }
      const ip = await getIp();
      if (await isIpBanned(ip)) {
        alert('Вы забанены');
        return;
      }
      // Проверим locked статус поста
      const { data: parentPost } = await supabase
        .from('messages')
        .select('locked')
        .eq('id', currentPostId)
        .single();
      if (parentPost && parentPost.locked) {
        alert('Комментарии к этому посту отключены');
        return;
      }
      let imageUrl = null;
      if (commentImageFile.current) {
        try {
          imageUrl = await uploadImage(commentImageFile.current);
        } catch (e) {
          alert(e.message);
          return;
        }
      }
      const info = await collectSubmitterInfo();
      const { error: insertError } = await supabase.from('messages').insert([{
        text: text || '',
        parent_id: currentPostId,
        approved: false,
        submitter_ip: info.ip,
        submitter_ua: info.ua,
        submitter_fingerprint: info.fingerprint,
        image_url: imageUrl
      }]);
      if (insertError) {
        alert('Ошибка при сохранении комментария: ' + insertError.message);
        return;
      }
      newCommentText.value = '';
      commentImageFile.current = null;
      commentImageInput.value = '';
      commentImagePreview.style.display = 'none';
      loadComments(currentPostId);
    });
    closeDetailBtn.addEventListener('click', () => hideModal(postDetailModal));
    closeAdminPanelBtn.addEventListener('click', () => hideModal(adminPanelModal));

    darkThemeToggle.addEventListener('change', (e) => {
      document.body.classList.toggle('dark-theme', e.target.checked);
      localStorage.setItem('darkTheme', e.target.checked ? '1' : '0');
    });
    closeSettingsBtn.addEventListener('click', () => hideModal(settingsModal));

    if (localStorage.getItem('darkTheme') === '1') {
      document.body.classList.add('dark-theme');
      darkThemeToggle.checked = true;
    }

    window.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) hideModal(e.target);
    });

    (async function init() {
      const allowed = await checkGeo();
      if (allowed) {
        loadHome();
      }
    })();
  </script>
</body>
</html>
