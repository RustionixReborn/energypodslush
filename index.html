<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>⚡ Энергия Вещает</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #f8f9fa;
      --text: #1a1a1a;
      --text-secondary: #555555;
      --primary: #1976d2;
      --accent: #1565c0;
      --border: #dde4ea;
      --input-bg: #f1f3f5;
      --shadow: 0 4px 12px rgba(0,0,0,0.06);
      --glow: rgba(25,118,210,0.25);
      --radius: 16px;
      --nav-width: 220px;
    }
    .dark-theme {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #ffffff;
      --text-secondary: #aaaaaa;
      --primary: #bb86fc;
      --accent: #9c4dff;
      --border: #333333;
      --input-bg: #2a2a2a;
      --shadow: 0 4px 15px rgba(0,0,0,0.4);
      --glow: rgba(187,134,252,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.4s, color 0.4s;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #app {
      display: flex;
      width: 100%;
      max-width: 900px;
      min-height: 100vh;
      position: relative;
    }

    .vpn-block {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      font-size: 22px;
      color: var(--text);
    }
    .vpn-block .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .sidebar {
      width: var(--nav-width);
      background: var(--card);
      border-right: 2px solid var(--border);
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: sticky;
      top: 0;
      height: 100vh;
      z-index: 50;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      color: var(--text);
      transition: all 0.2s;
      border: 1px solid transparent;
      text-decoration: none;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 0 12px var(--glow);
    }
    .nav-item svg {
      width: 22px; height: 22px;
      fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 12px 0 8px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      backdrop-filter: blur(12px);
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      text-shadow: 0 0 12px var(--glow);
      cursor: default;
    }
    .settings-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--card);
      color: var(--primary);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.25s;
    }
    .settings-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 0 16px var(--glow);
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 80px;
      transition: opacity 0.15s ease;
    }
    .feed.fade-out { opacity: 0; }
    .post-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(20px);
      position: relative;
    }
    .post-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .post-card:hover {
      border-color: var(--primary);
      box-shadow: 0 8px 25px var(--glow);
      transform: translateY(-3px);
    }
    .post-text {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .post-time {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .post-image {
      max-width: 100%;
      max-height: 400px;
      border-radius: 12px;
      margin-top: 10px;
      object-fit: contain;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .post-image:hover { transform: scale(1.02); }
    .pin-icon {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 18px;
      opacity: 0.8;
    }

    .fab {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 26px;
      border: none;
      box-shadow: 0 6px 20px var(--glow);
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .fab:hover {
      background: var(--accent);
      box-shadow: 0 10px 30px var(--glow);
      transform: translateY(-3px) scale(1.05);
    }

    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s;
      justify-content: center;
      align-items: center;
    }
    .modal.active { visibility: visible; opacity: 1; }
    .modal-content {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      transform: scale(0.9);
      transition: transform 0.3s;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal.active .modal-content { transform: scale(1); }
    .modal-title { font-size: 20px; margin-bottom: 16px; font-weight: 600; }
    .modal-input {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: var(--input-bg);
      color: var(--text);
      margin-bottom: 12px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .modal-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 10px var(--glow);
    }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .btn {
      padding: 10px 18px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-size: 14px;
      transition: all 0.25s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .btn:hover {
      filter: brightness(1.1);
      box-shadow: 0 6px 14px var(--glow);
      transform: translateY(-1px);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }
    .btn-secondary { background: #9e9e9e; }
    .btn-danger { background: #e53935; }
    .btn-success { background: #2e7d32; }

    .comment-item {
      background: var(--input-bg);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .image-preview {
      position: relative;
      display: inline-block;
      margin-bottom: 12px;
    }
    .image-preview img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .remove-image-btn {
      position: absolute;
      top: -8px; right: -8px;
      background: #e53935;
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px; height: 24px;
      font-size: 14px;
      cursor: pointer;
    }
    .file-input-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .file-input-label input { display: none; }

    /* Блоки для вкладки Найти */
    .search-blocks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding-bottom: 80px;
    }
    .search-block {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 18px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
    }
    .search-block.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .search-block:hover {
      border-color: var(--primary);
      box-shadow: 0 8px 25px var(--glow);
      transform: translateY(-3px);
    }
    .search-block .block-icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--text);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin-bottom: 10px;
    }
    .search-block .block-title {
      font-weight: 600;
      font-size: 15px;
    }

    .rules p { margin-bottom: 12px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: var(--card);
        border-top: 2px solid var(--border);
        padding: 8px 10px;
        justify-content: space-around;
        z-index: 100;
      }
      .bottom-nav .nav-item {
        flex-direction: column;
        gap: 4px;
        font-size: 11px;
        padding: 8px 10px;
      }
      .bottom-nav .nav-item svg { width: 22px; height: 22px; }
      .fab {
        width: 52px; height: 52px;
        bottom: 80px; right: 16px;
      }
    }
    @media (min-width: 769px) {
      .bottom-nav { display: none; }
    }
  </style>
</head>
<body>
  <div class="vpn-block" id="vpnBlock">
    <div class="icon">🛡️</div>
    <p>Пожалуйста, выключите VPN</p>
    <p id="vpnMessage">Доступ разрешён только из России</p>
  </div>

  <div id="app">
    <nav class="sidebar" id="sidebar">
      <div class="nav-item active" data-tab="home">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Главная
      </div>
      <div class="nav-item" data-tab="search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Найти
      </div>
    </nav>

    <main class="main-content">
      <header>
        <div class="title">⚡ Энергия Вещает</div>
        <button class="settings-btn" id="settingsBtn">⚙️</button>
      </header>
      <div id="feed" class="feed"></div>
    </main>

    <nav class="bottom-nav" id="bottomNav">
      <div class="nav-item active" data-tab="home">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Главная
      </div>
      <div class="nav-item" data-tab="search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Найти
      </div>
    </nav>
  </div>

  <button class="fab" id="createPostBtn">✚</button>

  <!-- Модалки -->
  <div class="modal" id="createPostModal">
    <div class="modal-content">
      <div class="modal-title">Новый пост</div>
      <textarea class="modal-input" id="newPostText" rows="4" placeholder="Что хочешь рассказать?"></textarea>
      <label class="file-input-label" for="postImageInput">📎 Фото</label>
      <input type="file" id="postImageInput" accept="image/*">
      <div id="postImagePreview" class="image-preview" style="display:none;">
        <img id="postPreviewImg" src="" alt="Предпросмотр">
        <button class="remove-image-btn" id="removePostImageBtn">✕</button>
      </div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="cancelPostBtn">Отмена</button>
        <button class="btn" id="submitPostBtn">Отправить анонимно</button>
      </div>
    </div>
  </div>

  <div class="modal" id="postDetailModal">
    <div class="modal-content">
      <div id="detailPostContent"></div>
      <hr style="border: 1px solid var(--border); margin: 16px 0;">
      <div class="modal-title" style="font-size: 18px;">Комментарии</div>
      <div id="commentsList" style="margin-bottom: 16px;"></div>
      <div id="commentFormBlock">
        <textarea class="modal-input" id="newCommentText" rows="2" placeholder="Анонимный комментарий..."></textarea>
        <label class="file-input-label" for="commentImageInput">📎 Фото</label>
        <input type="file" id="commentImageInput" accept="image/*">
        <div id="commentImagePreview" class="image-preview" style="display:none;">
          <img id="commentPreviewImg" src="" alt="Предпросмотр">
          <button class="remove-image-btn" id="removeCommentImageBtn">✕</button>
        </div>
        <button class="btn" id="submitCommentBtn" style="margin-top: 8px;">Отправить</button>
      </div>
      <div id="commentsLockedMsg" style="display:none; color: var(--text-secondary); margin-top: 12px;">Комментарии отключены</div>
      <button class="btn btn-secondary" id="closeDetailBtn" style="margin-top: 8px; margin-left: 8px;">Закрыть</button>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-title">Настройки</div>
      <div class="settings-row">
        <span>Тёмная тема</span>
        <label class="switch">
          <input type="checkbox" id="darkThemeToggle">
          <span class="slider"></span>
        </label>
      </div>
      <button class="btn btn-secondary" id="closeSettingsBtn" style="margin-top: 16px;">Закрыть</button>
    </div>
  </div>

  <script type="module">
    const SUPABASE_URL = 'https://jsfgmzsypmbnvvthbvbh.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_JCzEET-XQtIa90ovm3GKOw_feSE9nYV';

    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const BUCKET_NAME = 'post-images';
    let userIp = null;

    async function checkGeo() {
      try {
        const resp = await fetch('https://ip-api.com/json/?fields=countryCode,query');
        const data = await resp.json();
        if (data && data.query) {
          userIp = data.query;
          if (data.countryCode && data.countryCode !== 'RU') {
            document.getElementById('vpnBlock').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            document.getElementById('createPostBtn').style.display = 'none';
            return false;
          }
        }
      } catch (e) {}
      document.getElementById('vpnBlock').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      return true;
    }

    async function getIp() {
      if (userIp) return userIp;
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        userIp = data.ip;
        return userIp;
      } catch { return 'неизвестно'; }
    }

    function getFingerprint() {
      let fp = localStorage.getItem('device_fp');
      if (!fp) {
        fp = 'fp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('device_fp', fp);
      }
      return fp;
    }

    async function uploadImage(file) {
      if (file.size > 5 * 1024 * 1024) throw new Error('Файл слишком большой (макс. 5 МБ)');
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}_${Math.random().toString(36).substr(2,9)}.${fileExt}`;
      const { data, error } = await supabase.storage
        .from(BUCKET_NAME)
        .upload(fileName, file, { cacheControl: '3600', upsert: false });
      if (error) throw new Error(`Ошибка загрузки: ${error.message}`);
      const { data: urlData } = supabase.storage.from(BUCKET_NAME).getPublicUrl(fileName);
      return urlData.publicUrl;
    }

    const $ = (s) => document.querySelector(s);
    const feed = $('#feed');
    const createPostBtn = $('#createPostBtn');
    const settingsBtn = $('#settingsBtn');
    const createPostModal = $('#createPostModal');
    const newPostText = $('#newPostText');
    const submitPostBtn = $('#submitPostBtn');
    const cancelPostBtn = $('#cancelPostBtn');
    const postDetailModal = $('#postDetailModal');
    const detailPostContent = $('#detailPostContent');
    const commentsList = $('#commentsList');
    const newCommentText = $('#newCommentText');
    const submitCommentBtn = $('#submitCommentBtn');
    const closeDetailBtn = $('#closeDetailBtn');
    const settingsModal = $('#settingsModal');
    const darkThemeToggle = $('#darkThemeToggle');
    const closeSettingsBtn = $('#closeSettingsBtn');
    const commentFormBlock = $('#commentFormBlock');
    const commentsLockedMsg = $('#commentsLockedMsg');
    const postImageInput = $('#postImageInput');
    const postImagePreview = $('#postImagePreview');
    const postPreviewImg = $('#postPreviewImg');
    const removePostImageBtn = $('#removePostImageBtn');
    const commentImageInput = $('#commentImageInput');
    const commentImagePreview = $('#commentImagePreview');
    const commentPreviewImg = $('#commentPreviewImg');
    const removeCommentImageBtn = $('#removeCommentImageBtn');

    let currentTab = 'home';
    let currentPosts = [];
    let currentPostId = null;

    function setupImagePreview(input, previewDiv, imgElement, removeBtn, fileRef) {
      input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          fileRef.current = file;
          const reader = new FileReader();
          reader.onload = (ev) => {
            imgElement.src = ev.target.result;
            previewDiv.style.display = 'block';
          };
          reader.readAsDataURL(file);
        } else {
          fileRef.current = null;
          previewDiv.style.display = 'none';
        }
      });
      removeBtn.addEventListener('click', () => {
        fileRef.current = null;
        input.value = '';
        previewDiv.style.display = 'none';
      });
    }

    const postImageFile = { current: null };
    const commentImageFile = { current: null };
    setupImagePreview(postImageInput, postImagePreview, postPreviewImg, removePostImageBtn, postImageFile);
    setupImagePreview(commentImageInput, commentImagePreview, commentPreviewImg, removeCommentImageBtn, commentImageFile);

    function setActiveTab(tab) {
      if (currentTab === tab) return;
      currentTab = tab;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.querySelectorAll(`.nav-item[data-tab="${tab}"]`).forEach(el => el.classList.add('active'));

      createPostBtn.style.display = tab === 'home' ? 'flex' : 'none';

      feed.classList.add('fade-out');
      setTimeout(() => {
        if (tab === 'home') loadHome();
        else if (tab === 'search') loadSearch();
      }, 150);
    }

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => setActiveTab(item.dataset.tab));
    });

    async function loadHome() {
      try {
        const { data } = await supabase
          .from('mess_apr')
          .select('*')
          .order('pinned', { ascending: false })
          .order('created_at', { ascending: false });
        currentPosts = data || [];
        renderHomeFeed();
      } catch (e) {
        feed.innerHTML = '<div class="empty-message">Нет соединения с сервером</div>';
      }
      feed.classList.remove('fade-out');
    }

    function renderHomeFeed() {
      if (currentPosts.length === 0) {
        feed.innerHTML = '<div class="empty-message">Пока никто ничего не рассказал...</div>';
        return;
      }
      feed.innerHTML = currentPosts.map(post => {
        const imgHtml = post.image_url
          ? `<img src="${escapeHtml(post.image_url)}" class="post-image" loading="lazy" onclick="event.stopPropagation(); window.open('${escapeHtml(post.image_url)}')">`
          : '';
        const pinHtml = post.pinned ? '<span class="pin-icon">📌</span>' : '';
        return `
          <div class="post-card" data-id="${post.id}">
            ${pinHtml}
            <div class="post-text">${escapeHtml(post.text)}</div>
            ${imgHtml}
            <div class="post-time">${new Date(post.created_at).toLocaleString('ru-RU')}</div>
          </div>
        `;
      }).join('');
      animateCards('.post-card');
      document.querySelectorAll('.post-card').forEach(card => {
        card.addEventListener('click', () => openPost(card.dataset.id));
      });
    }

    async function loadComments(postId) {
      const { data } = await supabase
        .from('mess_komm')
        .select('*')
        .eq('parent_id', postId)
        .eq('approved', true)
        .order('created_at', { ascending: true });
      renderComments(data || []);
    }

    function renderComments(comments) {
      if (!comments.length) {
        commentsList.innerHTML = '<div style="color: var(--text-secondary); margin-bottom: 12px;">Нет комментариев</div>';
        return;
      }
      commentsList.innerHTML = comments.map(c => {
        const imgHtml = c.image_url
          ? `<img src="${escapeHtml(c.image_url)}" class="post-image" style="max-height:200px; margin-top:6px;" onclick="window.open('${escapeHtml(c.image_url)}')">`
          : '';
        return `
          <div class="comment-item">
            <div>${escapeHtml(c.text)}</div>
            ${imgHtml}
            <div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">${new Date(c.created_at).toLocaleString('ru-RU')}</div>
          </div>
        `;
      }).join('');
    }

    async function openPost(postId) {
      currentPostId = postId;
      const post = currentPosts.find(p => p.id === postId);
      if (!post) return;
      detailPostContent.innerHTML = `
        <div style="font-size: 18px; margin-bottom: 8px; font-weight: 500;">${escapeHtml(post.text)}</div>
        ${post.image_url ? `<img src="${escapeHtml(post.image_url)}" class="post-image" style="max-height:300px; cursor:pointer;" onclick="window.open('${escapeHtml(post.image_url)}')">` : ''}
        <div style="font-size: 12px; color: var(--text-secondary);">${new Date(post.created_at).toLocaleString('ru-RU')}</div>
      `;
      await loadComments(postId);
      showModal(postDetailModal);
    }

    // ========== ВКЛАДКА "НАЙТИ" ==========
    function loadSearch() {
      feed.innerHTML = `
        <div class="search-blocks" id="searchBlocks">
          <div class="search-block" data-block="events">
            <div class="block-icon">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <div class="block-title">Ближайшие события</div>
          </div>
          <div class="search-block" data-block="news">
            <div class="block-icon">
              <svg viewBox="0 0 24 24"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
            </div>
            <div class="block-title">Новости дня</div>
          </div>
          <div class="search-block" data-block="rules">
            <div class="block-icon">
              <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div class="block-title">Правила</div>
          </div>
          <div class="search-block" data-block="docs">
            <div class="block-icon">
              <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="block-title">Документация</div>
          </div>
        </div>
      `;
      animateCards('.search-block');
      
      document.querySelectorAll('.search-block').forEach(block => {
        block.addEventListener('click', () => {
          const type = block.dataset.block;
          if (type === 'events') showEvents();
          else if (type === 'news') showDailyNews();
          else if (type === 'rules') showRules();
          else if (type === 'docs') showDocs();
        });
      });
      feed.classList.remove('fade-out');
    }

    async function showEvents() {
      const { data: events } = await supabase.from('events').select('*').order('created_at', { ascending: false });
      feed.innerHTML = events && events.length > 0 ? events.map(e => `
        <div class="post-card visible" style="cursor:pointer;">
          <div class="post-text" style="font-weight: 600;">${escapeHtml(e.title)}</div>
          <div style="font-size: 14px; color: var(--text-secondary);">${escapeHtml(e.short_desc)}</div>
          <div class="event-detail" style="display: none; margin-top: 10px;">
            ${e.image_url ? `<img src="${escapeHtml(e.image_url)}" class="post-image" style="max-height:250px;">` : ''}
            <div style="margin-top: 10px;">${escapeHtml(e.full_desc)}</div>
          </div>
        </div>
      `).join('') : '<div class="empty-message">Пока нет событий</div>';

      document.querySelectorAll('.post-card').forEach(card => {
        card.addEventListener('click', function() {
          const detail = this.querySelector('.event-detail');
          if (detail.style.display === 'none') {
            detail.style.display = 'block';
            detail.style.animation = 'fadeIn 0.3s ease';
          } else {
            detail.style.display = 'none';
          }
        });
      });
    }

    async function showDailyNews() {
      const { data } = await supabase.from('daily_news').select('*').limit(1).single();
      if (data) {
        feed.innerHTML = `
          <div class="post-card visible">
            ${data.image_url ? `<img src="${escapeHtml(data.image_url)}" class="post-image">` : ''}
            <div class="post-text" style="font-weight: 600;">${escapeHtml(data.title || '')}</div>
            <div style="font-size: 14px; color: var(--text-secondary);">${escapeHtml(data.short_desc || '')}</div>
          </div>
        `;
      } else {
        feed.innerHTML = '<div class="empty-message">Новостей пока нет</div>';
      }
    }

    function showRules() {
      feed.innerHTML = `
        <div class="rules">
          <h2>Правила сообщества</h2>
          <p>1. Запрещены угрозы жизни и здоровью людей.</p>
          <p>2. Запрещено разжигание межнациональной розни.</p>
          <p>3. Запрещена пропаганда наркотиков и алкоголя.</p>
          <p>4. Запрещён спам и реклама сторонних ресурсов.</p>
          <p>5. Запрещено выдавать себя за администрацию.</p>
          <p>6. Уважайте чужое мнение и личные границы.</p>
          <p>7. Запрещено публиковать личные данные других людей.</p>
          <p>8. За мат и оскорбления — бан без предупреждения.</p>
          <p>9. Администрация оставляет за собой право удалять любой контент.</p>
          <p>10. Нарушение правил ведёт к блокировке доступа.</p>
        </div>
      `;
    }

    function showDocs() {
      feed.innerHTML = `
        <div class="rules">
          <h2>Документация</h2>
          <p><strong>⚡ Энергия Вещает</strong> — это независимый школьный проект, созданный для анонимного общения учеников школы №2070.</p>
          <p>Проект не имеет никакого отношения к официальному Telegram-каналу «Энергия Вещает», администрации школы, учителям или любым другим официальным структурам.</p>
          <p>Все совпадения с названиями случайны. Проект использует открытые технологии и не хранит персональные данные пользователей, кроме технической информации, необходимой для предотвращения нарушений (IP-адрес, fingerprint браузера).</p>
          <p>Администрация проекта не несёт ответственности за содержание сообщений, публикуемых пользователями. Каждый автор самостоятельно несёт ответственность за написанное.</p>
          <p>При обнаружении нарушений просьба обращаться к администратору через встроенные средства модерации или лично.</p>
          <p>Проект работает на безвозмездной основе, не собирает пожертвований и не размещает рекламу.</p>
          <p>Дата основания: 2025 год. Все права на дизайн и код принадлежат создателю проекта.</p>
          <p>Используемое ПО: Supabase (база данных), Netlify (хостинг), иконки из открытых источников.</p>
          <p>Спасибо, что вы с нами! 💙</p>
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showModal(m) { m.classList.add('active'); }
    function hideModal(m) { m.classList.remove('active'); }
    function animateCards(selector) {
      document.querySelectorAll(selector).forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 50);
      });
    }

    createPostBtn.addEventListener('click', () => {
      newPostText.value = '';
      postImageFile.current = null;
      postImageInput.value = '';
      postImagePreview.style.display = 'none';
      showModal(createPostModal);
      newPostText.focus();
    });

    settingsBtn.addEventListener('click', () => showModal(settingsModal));

    submitPostBtn.addEventListener('click', async () => {
      const text = newPostText.value.trim();
      if (!text && !postImageFile.current) {
        alert('Напишите текст или добавьте фото');
        return;
      }
      submitPostBtn.disabled = true;
      submitPostBtn.textContent = 'Отправка...';
      try {
        const ip = await getIp();
        let imageUrl = null;
        if (postImageFile.current) {
          imageUrl = await uploadImage(postImageFile.current);
        }
        await supabase.from('mess_notapr').insert([{
          text: text || '',
          image_url: imageUrl,
          submitter_ip: ip,
          submitter_ua: navigator.userAgent,
          submitter_fingerprint: getFingerprint()
        }]);
        hideModal(createPostModal);
      } catch (e) {
        alert('Ошибка сети');
      } finally {
        submitPostBtn.disabled = false;
        submitPostBtn.textContent = 'Отправить анонимно';
      }
    });
    cancelPostBtn.addEventListener('click', () => hideModal(createPostModal));

    submitCommentBtn.addEventListener('click', async () => {
      const text = newCommentText.value.trim();
      if (!text && !commentImageFile.current) return;
      submitCommentBtn.disabled = true;
      try {
        const ip = await getIp();
        let imageUrl = null;
        if (commentImageFile.current) {
          imageUrl = await uploadImage(commentImageFile.current);
        }
        await supabase.from('mess_komm').insert([{
          text: text || '',
          parent_id: currentPostId,
          approved: false,
          image_url: imageUrl,
          submitter_ip: ip,
          submitter_ua: navigator.userAgent,
          submitter_fingerprint: getFingerprint()
        }]);
        newCommentText.value = '';
        commentImageFile.current = null;
        commentImageInput.value = '';
        commentImagePreview.style.display = 'none';
        loadComments(currentPostId);
      } catch (e) {
        alert('Ошибка сети');
      } finally {
        submitCommentBtn.disabled = false;
        submitCommentBtn.textContent = 'Отправить';
      }
    });
    closeDetailBtn.addEventListener('click', () => hideModal(postDetailModal));

    darkThemeToggle.addEventListener('change', (e) => {
      document.body.classList.toggle('dark-theme', e.target.checked);
      localStorage.setItem('darkTheme', e.target.checked ? '1' : '0');
    });
    closeSettingsBtn.addEventListener('click', () => hideModal(settingsModal));

    if (localStorage.getItem('darkTheme') === '1') {
      document.body.classList.add('dark-theme');
      darkThemeToggle.checked = true;
    }

    window.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) hideModal(e.target);
    });

    (async function init() {
      const allowed = await checkGeo();
      if (allowed) {
        setActiveTab('home');
      }
    })();
  </script>
</body>
</html>
